but when we just want to understand a concept of javascript we just write a script code 
and then run it using in terminal by the command node filename.js -->
 

<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Pattern</title>
</head>
<body>

    <h2>Right Triangle Star Pattern</h2>

    <script>

        let n = 6;

        for (let i = 1; i <= n; i++) {

            let row = "";

            for (let j = 1; j <= i; j++) {
                row += "* ";
            }

            console.log(row);

        }

    </script>

</body>
</html>
