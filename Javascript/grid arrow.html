<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>8 x 8 Grid</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
        }

        .grid {
            width: 100vw;
            height: 100vh;

            display: grid;

            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
        }

        .box {
            border: 1px solid black;
        }

        .active {
            background-color: black;
        }
    </style>
</head>

<body>

    <div class="grid" id="grid"></div>

    <script>

        const grid = document.getElementById("grid");

        // Store the current black box index
        let currentIndex = 0;

        // Create 64 boxes
        for (let i = 0; i < 64; i++) {

            const box = document.createElement("div");

            box.classList.add("box");

            // Make the first box black
            if (i === currentIndex) {
                box.classList.add("active");
            }

            grid.appendChild(box);
        }


        // Select all boxes
        const boxes = document.querySelectorAll(".box");


        // Listen for keyboard keys
        document.addEventListener("keydown", function (event) {

            // Remove black from current box
            boxes[currentIndex].classList.remove("active");


            if (event.key === "ArrowRight") {

                if (currentIndex % 8 !== 7) {
                    currentIndex++;
                }

            }

            else if (event.key === "ArrowLeft") {

                if (currentIndex % 8 !== 0) {
                    currentIndex--;
                }

            }

            else if (event.key === "ArrowDown") {

                if (currentIndex < 56) {
                    currentIndex += 8;
                }

            }

            else if (event.key === "ArrowUp") {

                if (currentIndex >= 8) {
                    currentIndex -= 8;
                }

            }


            // Add black to the new current box
            boxes[currentIndex].classList.add("active");

        });

    </script>

</body>

</html>
